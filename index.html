<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thingual — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --indigo: #4338ca;
    --cyan: #06b6d4;
    --ink: #0f172a;
    --ink-deep: #070b14;
    --amber: #f59e0b;
    --slate: #94a3b8;
    --white: #f1f5f9;
    --glow-indigo: rgba(67,56,202,.35);
    --glow-cyan: rgba(6,182,212,.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--ink-deep);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
  }

  /* ── CANVAS BACKGROUND ── */
  #particleCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* ── RADIAL GLOWS ── */
  .glow-layer {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 600px 500px at 25% 30%, var(--glow-indigo) 0%, transparent 70%),
      radial-gradient(ellipse 500px 400px at 75% 65%, var(--glow-cyan) 0%, transparent 70%),
      radial-gradient(ellipse 300px 300px at 50% 50%, rgba(245,158,11,.06) 0%, transparent 60%);
  }

  /* ── MAIN CONTAINER ── */
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px 24px;
    max-width: 620px;
    width: 100%;
  }

  /* ── CLOUD LOGO ── */
  .logo-wrap {
    margin-bottom: 36px;
    animation: floatIn 1.2s cubic-bezier(.16,1,.3,1) both;
  }

  .logo-svg {
    width: 120px;
    height: auto;
    filter: drop-shadow(0 0 30px rgba(6,182,212,.3)) drop-shadow(0 0 60px rgba(67,56,202,.2));
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { filter: drop-shadow(0 0 30px rgba(6,182,212,.3)) drop-shadow(0 0 60px rgba(67,56,202,.2)); transform: translateY(0); }
    50% { filter: drop-shadow(0 0 45px rgba(6,182,212,.45)) drop-shadow(0 0 80px rgba(67,56,202,.3)); transform: translateY(-6px); }
  }

  /* ── WORDMARK ── */
  .wordmark {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: clamp(2.4rem, 8vw, 3.6rem);
    letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--cyan) 0%, #818cf8 40%, var(--indigo) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
    animation: floatIn 1.2s cubic-bezier(.16,1,.3,1) .15s both;
  }

  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(.65rem, 2vw, .8rem);
    font-weight: 500;
    letter-spacing: 5px;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 48px;
    animation: floatIn 1.2s cubic-bezier(.16,1,.3,1) .3s both;
  }

  /* ── COMING SOON ── */
  .coming-soon {
    font-weight: 200;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    color: var(--slate);
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 16px;
    animation: floatIn 1s cubic-bezier(.16,1,.3,1) .5s both;
  }

  .headline {
    font-weight: 700;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    line-height: 1.25;
    color: var(--white);
    margin-bottom: 20px;
    animation: floatIn 1s cubic-bezier(.16,1,.3,1) .6s both;
  }

  .headline span {
    background: linear-gradient(90deg, var(--cyan), var(--indigo));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtext {
    font-weight: 300;
    font-size: clamp(.9rem, 2.5vw, 1.05rem);
    color: var(--slate);
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto 0;
    animation: floatIn 1s cubic-bezier(.16,1,.3,1) .7s both;
  }


  /* ── BOTTOM BADGE ── */
  .bottom-badge {
    position: fixed;
    bottom: 24px;
    left: 0;
    right: 0;
    width: 100%;
    text-align: center;
    z-index: 20;
    font-family: 'JetBrains Mono', monospace;
    font-size: .62rem;
    letter-spacing: 2px;
    color: rgba(148,163,184,.3);
    text-transform: uppercase;
    animation: floatIn 1s cubic-bezier(.16,1,.3,1) 1.4s both;
  }

  /* ── ANIMATIONS ── */
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(28px); }
    to { opacity: 1; transform: translateY(0); }
  }

</style>
</head>
<body>

<!-- PARTICLE CANVAS -->
<canvas id="particleCanvas"></canvas>

<!-- GLOW LAYER -->
<div class="glow-layer"></div>

<!-- MAIN CONTENT -->
<div class="container">

  <!-- CLOUD LOGO -->
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
      <defs>
        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#4338ca"/>
          <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
      </defs>
      <!-- Layer 1: Ghost shadow -->
      <g opacity="0.07" transform="translate(-6,-6)">
        <path d="M60,138L72,118C54,118,38,108,36,92C34,80,40,70,48,63C38,55,36,42,44,32C50,24,58,22,66,24C64,14,72,6,84,6C92,2,102,4,110,10C116,4,128,2,136,12C144,8,156,18,156,34C164,42,164,58,156,70C154,82,142,94,130,98C122,106,108,110,96,108L78,110Z" fill="url(#logoGrad)"/>
      </g>
      <!-- Layer 2: Ghost stroke -->
      <g opacity="0.2" transform="translate(-3,-3)">
        <path d="M60,138L72,118C54,118,38,108,36,92C34,80,40,70,48,63C38,55,36,42,44,32C50,24,58,22,66,24C64,14,72,6,84,6C92,2,102,4,110,10C116,4,128,2,136,12C144,8,156,18,156,34C164,42,164,58,156,70C154,82,142,94,130,98C122,106,108,110,96,108L78,110Z" stroke="url(#logoGrad)" stroke-width="1.5" fill="none"/>
      </g>
      <!-- Layer 3: Main cloud -->
      <path d="M60,138L72,118C54,118,38,108,36,92C34,80,40,70,48,63C38,55,36,42,44,32C50,24,58,22,66,24C64,14,72,6,84,6C92,2,102,4,110,10C116,4,128,2,136,12C144,8,156,18,156,34C164,42,164,58,156,70C154,82,142,94,130,98C122,106,108,110,96,108L78,110Z" fill="white"/>
      <!-- Synapse dots -->
      <circle cx="42" cy="154" r="4.5" fill="white" opacity="0.5"/>
      <circle cx="30" cy="166" r="3" fill="white" opacity="0.3"/>
      <!-- T letterform -->
      <text x="96" y="82" text-anchor="middle" fill="#4338ca" font-family="Outfit,sans-serif" font-weight="800" font-size="52" opacity="0.95">T</text>
    </svg>
  </div>

  <!-- WORDMARK -->
  <div class="wordmark">Thingual</div>
  <div class="tagline">Think it. Speak it.</div>

  <!-- COMING SOON -->
  <div class="coming-soon">Coming Soon</div>
  <h1 class="headline">Language Learning,<br><span>Reimagined by AI</span></h1>
  <p class="subtext">We're building something extraordinary — an AI-native language platform that adapts to how your brain actually learns. Be the first to experience it.</p>

</div>

<!-- BOTTOM BADGE -->
<div class="bottom-badge">&copy; 2026 Thingual</div>

<script>
/* ── PARTICLE SYNAPSE SYSTEM ── */
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let w, h;
  const CONNECTION_DIST = 140;
  const mouse = { x: -9999, y: -9999 };

  function getCount() {
    return window.innerWidth < 600 ? 40 : 80;
  }

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function createParticles() {
    particles = [];
    const count = getCount();
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 2 + 1,
        color: Math.random() > 0.5 ? 'rgba(6,182,212,' : 'rgba(99,102,241,',
        baseAlpha: Math.random() * 0.3 + 0.1
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0) { p.x = w; }
      if (p.x > w) { p.x = 0; }
      if (p.y < 0) { p.y = h; }
      if (p.y > h) { p.y = 0; }

      /* Mouse proximity glow */
      const dx = p.x - mouse.x;
      const dy = p.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const proximity = dist < 200 ? (1 - dist / 200) * 0.5 : 0;
      const alpha = p.baseAlpha + proximity;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + alpha + ')';
      ctx.fill();

      /* Connection lines */
      for (let j = i + 1; j < particles.length; j++) {
        const p2 = particles[j];
        const ddx = p.x - p2.x;
        const ddy = p.y - p2.y;
        const d = Math.sqrt(ddx * ddx + ddy * ddy);
        if (d < CONNECTION_DIST) {
          const lineAlpha = (1 - d / CONNECTION_DIST) * 0.08;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = 'rgba(99,102,241,' + lineAlpha + ')';
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', function() { resize(); createParticles(); });
  document.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 0) {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
    }
  });

  resize();
  createParticles();
  draw();
})();

/* ── DARK MODE DETECTION ── */
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.classList.add('dark');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
  if (event.matches) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
});
</script>
</body>
</html>
