<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thingual — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --indigo: #4338ca;
    --cyan: #06b6d4;
    --ink: #0f172a;
    --ink-deep: #070b14;
    --amber: #f59e0b;
    --slate: #94a3b8;
    --white: #f1f5f9;
    --glow-indigo: rgba(67,56,202,.35);
    --glow-cyan: rgba(6,182,212,.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--ink-deep);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
  }

  /* ── CANVAS BACKGROUND ── */
  #particleCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* ── RADIAL GLOWS ── */
  .glow-layer {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 600px 500px at 25% 30%, var(--glow-indigo) 0%, transparent 70%),
      radial-gradient(ellipse 500px 400px at 75% 65%, var(--glow-cyan) 0%, transparent 70%),
      radial-gradient(ellipse 300px 300px at 50% 50%, rgba(245,158,11,.06) 0%, transparent 60%);
  }

  /* ── MAIN CONTAINER ── */
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px 24px;
    max-width: 620px;
    width: 100%;
  }

  /* ── TYPEWRITER LOGO ANIMATION ── */
  .tw-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 48px;
  }

  .tw-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .tw-mark-wrap {
    position: relative;
  }

  .tw-mark {
    opacity: 0;
    transform: scale(0.5) rotate(-15deg);
    filter: drop-shadow(0 0 30px rgba(6,182,212,.3)) drop-shadow(0 0 60px rgba(67,56,202,.2));
  }

  .tw-mark.play {
    animation: twMarkSpin 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  .tw-dot {
    opacity: 0;
    position: absolute;
  }

  .tw-dot1 {
    bottom: -6px;
    left: 6px;
  }

  .tw-dot2 {
    bottom: -16px;
    left: -4px;
  }

  .tw-dot1.play {
    animation: dotPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.6s forwards;
  }

  .tw-dot2.play {
    animation: dotPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1s forwards;
  }

  .tw-letters {
    display: flex;
    gap: 0;
    overflow: hidden;
  }

  .tw-letter {
    opacity: 0;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: clamp(2.2rem, 7vw, 3.2rem);
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--cyan) 0%, #818cf8 40%, var(--indigo) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    transform: translateY(8px);
  }

  .tw-letter.play {
    animation: twType 0.25s ease-out forwards;
  }

  .tw-cursor {
    width: 3px;
    height: clamp(2rem, 5.5vw, 2.8rem);
    background: var(--cyan);
    align-self: center;
    border-radius: 2px;
    opacity: 0;
    box-shadow: 0 0 8px rgba(6,182,212,.5);
  }

  .tw-cursor.play {
    animation: twBlink 0.75s step-end infinite;
  }

  .tw-tagline {
    opacity: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(.65rem, 2vw, .8rem);
    font-weight: 500;
    letter-spacing: 5px;
    color: var(--amber);
    text-transform: uppercase;
  }

  .tw-tagline.play {
    animation: fadeUp 0.6s ease-out forwards;
  }

  /* ── COMING SOON ── */
  .coming-soon {
    font-weight: 200;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    color: var(--slate);
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
  }

  .coming-soon.play {
    animation: floatIn 1s cubic-bezier(.16,1,.3,1) forwards;
  }

  .headline {
    font-weight: 700;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    line-height: 1.25;
    color: var(--white);
    margin-bottom: 20px;
    opacity: 0;
  }

  .headline.play {
    animation: floatIn 1s cubic-bezier(.16,1,.3,1) forwards;
  }

  .headline span {
    background: linear-gradient(90deg, var(--cyan), var(--indigo));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtext {
    font-weight: 300;
    font-size: clamp(.9rem, 2.5vw, 1.05rem);
    color: var(--slate);
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto 0;
    opacity: 0;
  }

  .subtext.play {
    animation: floatIn 1s cubic-bezier(.16,1,.3,1) forwards;
  }


  /* ── BOTTOM BADGE ── */
  .bottom-badge {
    position: fixed;
    bottom: 24px;
    left: 0;
    right: 0;
    width: 100%;
    text-align: center;
    z-index: 20;
    font-family: 'JetBrains Mono', monospace;
    font-size: .62rem;
    letter-spacing: 2px;
    color: rgba(148,163,184,.3);
    text-transform: uppercase;
    opacity: 0;
  }

  .bottom-badge.play {
    animation: floatIn 1s cubic-bezier(.16,1,.3,1) forwards;
  }

  /* ── ANIMATIONS ── */
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(28px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes twMarkSpin {
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  @keyframes twType {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes twBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @keyframes dotPop {
    0% { opacity: 0; transform: scale(0); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .tw-row { gap: 10px; }
    .tw-mark { width: 56px; height: 56px; }
  }

</style>
</head>
<body>

<!-- PARTICLE CANVAS -->
<canvas id="particleCanvas"></canvas>

<!-- GLOW LAYER -->
<div class="glow-layer"></div>

<!-- MAIN CONTENT -->
<div class="container">

  <!-- TYPEWRITER ANIMATED LOGO -->
  <div class="tw-stage">
    <div class="tw-row">
      <div class="tw-mark-wrap">
        <svg class="tw-mark" id="tw-mark" width="72" height="72" viewBox="-10 -25 210 210" fill="none">
          <defs>
            <linearGradient id="twg1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#4338ca"/>
              <stop offset="100%" stop-color="#06b6d4"/>
            </linearGradient>
          </defs>
          <g opacity="0.07" transform="translate(-6,-6)">
            <path d="M60,138L72,118C54,118,38,108,36,92C34,80,40,70,48,63C38,55,36,42,44,32C50,24,58,22,66,24C64,14,72,6,84,6C92,2,102,4,110,10C116,4,128,2,136,12C144,8,156,18,156,34C164,42,164,58,156,70C154,82,142,94,130,98C122,106,108,110,96,108L78,110Z" fill="url(#twg1)"/>
          </g>
          <g opacity="0.15" transform="translate(-3,-3)">
            <path d="M60,138L72,118C54,118,38,108,36,92C34,80,40,70,48,63C38,55,36,42,44,32C50,24,58,22,66,24C64,14,72,6,84,6C92,2,102,4,110,10C116,4,128,2,136,12C144,8,156,18,156,34C164,42,164,58,156,70C154,82,142,94,130,98C122,106,108,110,96,108L78,110Z" stroke="url(#twg1)" stroke-width="1.5" fill="none"/>
          </g>
          <path d="M60,138L72,118C54,118,38,108,36,92C34,80,40,70,48,63C38,55,36,42,44,32C50,24,58,22,66,24C64,14,72,6,84,6C92,2,102,4,110,10C116,4,128,2,136,12C144,8,156,18,156,34C164,42,164,58,156,70C154,82,142,94,130,98C122,106,108,110,96,108L78,110Z" fill="url(#twg1)"/>
          <circle cx="42" cy="154" r="4.5" fill="url(#twg1)" opacity="0.5"/>
          <circle cx="30" cy="166" r="3" fill="url(#twg1)" opacity="0.3"/>
          <text x="96" y="82" text-anchor="middle" fill="white" font-family="Outfit,sans-serif" font-weight="800" font-size="52">T</text>
        </svg>
        <svg class="tw-dot tw-dot1" id="tw-dot1" width="9" height="9" viewBox="0 0 9 9">
          <defs><linearGradient id="twd1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4338ca"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
          <circle cx="4.5" cy="4.5" r="4.5" fill="url(#twd1)" opacity="0.5"/>
        </svg>
        <svg class="tw-dot tw-dot2" id="tw-dot2" width="6" height="6" viewBox="0 0 6 6">
          <defs><linearGradient id="twd2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4338ca"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
          <circle cx="3" cy="3" r="3" fill="url(#twd2)" opacity="0.3"/>
        </svg>
      </div>
      <div class="tw-letters" id="tw-letters">
        <span class="tw-letter" id="tw-l0">T</span><span class="tw-letter" id="tw-l1">h</span><span class="tw-letter" id="tw-l2">i</span><span class="tw-letter" id="tw-l3">n</span><span class="tw-letter" id="tw-l4">g</span><span class="tw-letter" id="tw-l5">u</span><span class="tw-letter" id="tw-l6">a</span><span class="tw-letter" id="tw-l7">l</span>
      </div>
      <div class="tw-cursor" id="tw-cursor"></div>
    </div>
    <span class="tw-tagline" id="tw-tagline">THINK IT. SPEAK IT.</span>
  </div>

  <!-- COMING SOON -->
  <div class="coming-soon" id="coming-soon">Coming Soon</div>
  <h1 class="headline" id="headline">Language Learning,<br><span>Reimagined by AI</span></h1>
  <p class="subtext" id="subtext">We're building something extraordinary — an AI-native language platform that adapts to how your brain actually learns. Be the first to experience it.</p>

</div>

<!-- BOTTOM BADGE -->
<div class="bottom-badge" id="bottom-badge">&copy; 2026 Thingual</div>

<script>
/* ── TYPEWRITER ANIMATION SEQUENCER ── */
(function() {
  var mark = document.getElementById('tw-mark');
  var dot1 = document.getElementById('tw-dot1');
  var dot2 = document.getElementById('tw-dot2');
  var cursor = document.getElementById('tw-cursor');
  var tagline = document.getElementById('tw-tagline');
  var comingSoon = document.getElementById('coming-soon');
  var headline = document.getElementById('headline');
  var subtext = document.getElementById('subtext');
  var badge = document.getElementById('bottom-badge');
  var letters = [];
  for (var i = 0; i < 8; i++) {
    letters.push(document.getElementById('tw-l' + i));
  }

  /* Step 1: Cloud mark spins in (0ms) */
  setTimeout(function() {
    mark.classList.add('play');
    dot1.classList.add('play');
    dot2.classList.add('play');
  }, 300);

  /* Step 2: Cursor appears (800ms) */
  setTimeout(function() {
    cursor.classList.add('play');
  }, 800);

  /* Step 3: Letters type in one by one (1000ms+) */
  letters.forEach(function(letter, idx) {
    setTimeout(function() {
      letter.classList.add('play');
    }, 1000 + idx * 120);
  });

  /* Step 4: Tagline fades up after typing completes */
  setTimeout(function() {
    tagline.classList.add('play');
  }, 2200);

  /* Step 5: Coming soon + headline + subtext cascade in */
  setTimeout(function() {
    comingSoon.classList.add('play');
  }, 2700);

  setTimeout(function() {
    headline.classList.add('play');
  }, 2900);

  setTimeout(function() {
    subtext.classList.add('play');
  }, 3100);

  /* Step 6: Footer badge */
  setTimeout(function() {
    badge.classList.add('play');
  }, 3500);
})();

/* ── PARTICLE SYNAPSE SYSTEM ── */
(function() {
  var canvas = document.getElementById('particleCanvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var w, h;
  var CONNECTION_DIST = 140;
  var mouse = { x: -9999, y: -9999 };

  function getCount() {
    return window.innerWidth < 600 ? 40 : 80;
  }

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function createParticles() {
    particles = [];
    var count = getCount();
    for (var i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 2 + 1,
        color: Math.random() > 0.5 ? 'rgba(6,182,212,' : 'rgba(99,102,241,',
        baseAlpha: Math.random() * 0.3 + 0.1
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0) { p.x = w; }
      if (p.x > w) { p.x = 0; }
      if (p.y < 0) { p.y = h; }
      if (p.y > h) { p.y = 0; }

      var dx = p.x - mouse.x;
      var dy = p.y - mouse.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var proximity = dist < 200 ? (1 - dist / 200) * 0.5 : 0;
      var alpha = p.baseAlpha + proximity;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + alpha + ')';
      ctx.fill();

      for (var j = i + 1; j < particles.length; j++) {
        var p2 = particles[j];
        var ddx = p.x - p2.x;
        var ddy = p.y - p2.y;
        var d = Math.sqrt(ddx * ddx + ddy * ddy);
        if (d < CONNECTION_DIST) {
          var lineAlpha = (1 - d / CONNECTION_DIST) * 0.08;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = 'rgba(99,102,241,' + lineAlpha + ')';
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', function() { resize(); createParticles(); });
  document.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 0) {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
    }
  });

  resize();
  createParticles();
  draw();
})();

/* ── DARK MODE DETECTION ── */
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.classList.add('dark');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
  if (event.matches) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
});
</script>
</body>
</html>
